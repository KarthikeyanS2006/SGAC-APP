name: Build SGAC App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare app
        run: |
          mkdir -p admin-mobile/app/src/main/assets
          cp admin-mobile/index.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin-login.html admin-mobile/app/src/main/assets/
          cp -r admin-mobile/js admin-mobile/app/src/main/assets/

      - name: Build APK
        working-directory: admin-mobile
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1
          echo "=== Checking APK ==="
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK not found"

      - name: Verify APK exists
        run: |
          if [ -f "admin-mobile/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK found!"
            ls -la admin-mobile/app/build/outputs/apk/debug/
          else
            echo "APK NOT FOUND - Build may have failed"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SGAC-App
          path: admin-mobile/app/build/outputs
