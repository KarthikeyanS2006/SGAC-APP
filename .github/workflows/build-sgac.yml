name: Build SGAC App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create assets
        run: |
          mkdir -p admin-mobile/app/src/main/assets
          cp admin-mobile/index.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin-login.html admin-mobile/app/src/main/assets/
          cp -r admin-mobile/js admin-mobile/app/src/main/assets/

      - name: Grant execute permission
        run: chmod +x admin-mobile/gradlew

      - name: Build with Gradle
        working-directory: admin-mobile
        run: ./gradlew assembleDebug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SGAC-App
          path: admin-mobile/app/build/outputs
