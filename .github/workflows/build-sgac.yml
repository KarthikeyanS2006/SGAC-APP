name: Build SGAC App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
          echo "=== BUILD LOG ===" && cat build.log

      - name: Check APK
        run: |
          echo "Checking APK folder..."
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null && echo "APK found!" || echo "No APK folder"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SGAC-College-App
          path: android/app/build/outputs/apk/debug/
