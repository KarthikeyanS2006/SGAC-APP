name: Build SGAC App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy website files to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp History.html android/app/src/main/assets/
          cp Vision.html android/app/src/main/assets/
          cp Administration.html android/app/src/main/assets/
          cp Honours.html android/app/src/main/assets/
          cp Principal-Desk.html android/app/src/main/assets/
          cp Library.html android/app/src/main/assets/
          cp developer.html android/app/src/main/assets/
          cp admin-login.html android/app/src/main/assets/
          cp admin.html android/app/src/main/assets/
          cp -r css android/app/src/main/assets/
          cp -r js android/app/src/main/assets/
          cp -r Activities android/app/src/main/assets/
          cp -r Courses android/app/src/main/assets/
          echo "Files copied to assets:"
          ls -la android/app/src/main/assets/

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SGAC-College-App
          path: android/app/build/outputs/apk/debug/
