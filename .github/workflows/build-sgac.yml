name: Build SGAC App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | ./cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          ./cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV

      - name: Create assets folder
        run: |
          mkdir -p admin-mobile/app/src/main/assets
          cp admin-mobile/index.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin-login.html admin-mobile/app/src/main/assets/
          cp -r admin-mobile/js admin-mobile/app/src/main/assets/

      - name: Build APK
        working-directory: admin-mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          chmod +x gradlew
          chmod +x gradle/wrapper/gradle-wrapper.jar
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SGAC-College-App
          path: admin-mobile/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
