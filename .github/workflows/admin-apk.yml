name: Build Admin APK

on:
  push:
    branches: [main, master]
    paths:
      - 'admin-mobile/**'
      - 'js/site-data.js'
  pull_request:
    branches: [main, master]
    paths:
      - 'admin-mobile/**'
      - 'js/site-data.js'
  workflow_dispatch:

jobs:
  build:
    name: Build Admin APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare assets
        run: |
          mkdir -p admin-mobile/app/src/main/assets
          cp admin-mobile/index.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin.html admin-mobile/app/src/main/assets/
          cp admin-mobile/admin-login.html admin-mobile/app/src/main/assets/
          cp -r admin-mobile/js admin-mobile/app/src/main/assets/

      - name: Make Gradle wrapper executable
        working-directory: admin-mobile
        run: |
          chmod +x gradlew
          chmod +x gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        working-directory: admin-mobile
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sgac-admin-app-debug
          path: admin-mobile/app/build/outputs/apk/debug/*.apk
          retention-days: 7
